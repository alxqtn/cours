name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "presenterm/**"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: presenterm@0.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm install -g @mermaid-js/mermaid-cli

      - name: Export slides to HTML
        run: |
          mkdir -p dist
          for f in presenterm/*.md; do
            presenterm --config-file presenterm/ci-config.yaml --export-html --output "dist/$(basename "$f" .md).html" "$f"
          done
          cp presenterm/index.html dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
