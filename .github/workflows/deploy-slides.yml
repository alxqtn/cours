name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - "diagrams/**"
      - ".github/workflows/deploy-slides.yml"
      - ".github/deploy-config/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: presenterm@0.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm install -g @mermaid-js/mermaid-cli

      - name: Wrap mmdc to add --no-sandbox for headless CI
        run: |
          echo '{"args":["--no-sandbox"]}' > /tmp/puppeteer-config.json
          MMDC=$(which mmdc)
          mv "$MMDC" "${MMDC}-real"
          printf '#!/bin/sh\nexec "%s-real" --puppeteerConfigFile /tmp/puppeteer-config.json "$@"\n' "$MMDC" \
            > "$MMDC"
          chmod +x "$MMDC"

      - name: Export slides to HTML
        run: |
          mkdir -p dist
          for f in slides/*.md; do
            presenterm --config-file .github/deploy-config/ci-config.yaml --export-html --output "dist/$(basename "$f" .md).html" "$f"
          done

      - name: Copy diagrams
        run: cp diagrams/*.svg dist/ 2>/dev/null || true

      - uses: denoland/setup-deno@v2

      - name: Generate index.html
        run: deno run --allow-read --allow-write .github/deploy-config/generate-index.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
